<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
</head>
<body>
    <p>Rock Paper Scissors</p>

    <button onclick="playRound('rock')">Rock</button>

    <button onclick="playRound('paper')">Paper</button>

    <button onclick="playRound('scissors')">Scissors</button>

    <p class="jsResult"></p>
    <p class="jsMoves"></p>
    <p class="jsScore"></p>

    <button onclick="resetScore()">Reset Score</button>

    <script>
        //object for score
        /*const score = {
            wins: 0,
            losses: 0,
            ties: 0
        };*/

        //after saved in localStorage get it using parse to display in front
        let score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0,
            ties: 0
        };

        /*if (score === null){
            score = {
            wins: 0,
            losses: 0,
            ties: 0
        };
        }*/
    
        const playRound = (playerSelection) => {
            const choice = ["rock", "paper", "scissors"];

            const computerSelection = choice[Math.floor(Math.random() * 3)];

            let result = '';

            if (playerSelection === computerSelection){
                result = "It's a tie";
            }else if (
                (playerSelection === "rock" && computerSelection === "scissors") ||
                (playerSelection === "paper" && computerSelection === "rock") ||
                (playerSelection === "scissors" && computerSelection === "paper")
            ) {
                result = "You win!";
            } else {
                result = "You lose!";
            }

            //scorer with object container
            if (result === "You win!"){
                score.wins += 1;
            } else if (result === "You lose!"){
                score.losses += 1;
            }else if (result === "It's a tie"){
                score.ties += 1;
            }

            //convert the object into json to become local storage(storedata) and permanently saved.
            localStorage.setItem('score', JSON.stringify(score));
            
            
            updateScoreElement();

            document.querySelector('.jsResult').innerHTML = `${result}`;

            document.querySelector('.jsMoves').innerHTML = `Player: ${playerSelection}, Computer: ${computerSelection}`;

        }

        let updateScoreElement = () => {
            document.querySelector('.jsScore').innerHTML = 
        `Wins: ${score.wins} 
        Losses: ${score.losses}
        Ties: ${score.ties}`;
        }

        
        const resetScore = () => {
            score.wins = 0;
            score.losses = 0;
            score.ties = 0;
            //reset
            localStorage.removeItem('score');

            updateScoreElement()
        }

    </script>
</body>
</html>
