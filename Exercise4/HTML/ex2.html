<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise4-2</title>
</head>
<body>
    <script>
        let convertToFahrenheit = (celsius) => {
            return (celsius * 9 / 5) + 32;
        }

        let convertToCelsius = (fahrenheit) => {
            return (fahrenheit - 32) * 5 / 9;
        }
        
        let convertTemperature = (degrees, unit) => {
            if (unit === 'C'){
                return convertToFahrenheit(degrees) + 'F';
            }
            if(unit === 'F'){
                return convertToCelsius(degrees) + 'C';
            }
        }
        console.log(convertToFahrenheit(25));
        console.log(convertToCelsius(86));
        console.log(convertTemperature(25,'C'));
        console.log(convertTemperature(86,'F'));
    </script>
</body>
</html>
