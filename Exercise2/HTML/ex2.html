<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise2-2</title>
</head>
<body>
    <script>
        let coffeePrice = 5;
        let bagelsPrice = 3;
        let soupPrice = 9;
        
        let cost = coffeePrice + (bagelsPrice * 2) + soupPrice;
        let tax = cost * 0.10;
        let totalCost = cost + tax;

        console.log(`Cost of food: $${cost}`);
        console.log(`Tax(10%): $${tax}`);
        console.log(`Total cost: $${totalCost}`)
    </script>
</body>
</html>
