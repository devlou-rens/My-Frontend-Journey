<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise5-1</title>
</head>
<body>
    <script>
        basketballProduct = {
            name: 'Basketball',
            price: 2095,
        };

        console.log(basketballProduct);
        basketballProduct.price += 500;
        console.log(basketballProduct.price);

        basketballProduct.delivery_time = '3 days'
        console.log(basketballProduct);
        console.log(basketballProduct.delivery_time);

        product1 = {
            name: 'Bag',
            price: 500
        };

        product2 = {
            name: 'Shoes',
            price: 400
        };

        const comparePrice = (product1, product2) => {
            if (product1.price === product2.price){
                return 'Same Price';
            }else if (product1.price >= product2.price){
                return product2;
            }else if (product1.price <= product2.price){
                return product1;
            }
        }

        console.log(comparePrice(product1, product2));

        const isSameProduct = (product1, product2) => {
            if ((product1.price === product2.price) && (product1.name === product2.name)){
                return true;
            }else {
                return false;
            }
        }

        console.log(isSameProduct(product1, product2));

    </script>
</body>
</html>
